name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Angular for GitHub Pages
        run: npm run build:gh-pages

      - name: Prepare static output for Pages
        run: |
          set -e
          if [ -d dist/gh-pages/browser ]; then
            cp -R dist/gh-pages/browser/. dist/gh-pages/
          fi

          if [ -f dist/gh-pages/index.csr.html ] && [ ! -f dist/gh-pages/index.html ]; then
            cp dist/gh-pages/index.csr.html dist/gh-pages/index.html
          fi

          if [ ! -f dist/gh-pages/index.html ]; then
            echo "index.html not found after build"
            find dist -maxdepth 4 -type f | sort
            exit 1
          fi

          cp dist/gh-pages/index.html dist/gh-pages/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/gh-pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
