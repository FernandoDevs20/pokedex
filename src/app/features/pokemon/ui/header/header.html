<section class="header-shell">
  <div class="search-panel">
    <label class="field-label" for="pokemon-search">Name or Number</label>

    <form class="search-row" role="search" (submit)="onSubmit($event)">
      <input
        id="pokemon-search"
        class="search-input"
        type="search"
        autocomplete="off"
        [value]="query()"
        (input)="onQueryInput($event)"
      />

      <button class="search-button" type="submit" aria-label="Search Pokemon">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          aria-hidden="true"
          focusable="false"
        >
          <path
            xmlns="http://www.w3.org/2000/svg"
            d="M23.707,22.293l-5.969-5.969a10.016,10.016,0,1,0-1.414,1.414l5.969,5.969a1,1,0,0,0,1.414-1.414ZM10,18a8,8,0,1,1,8-8A8.009,8.009,0,0,1,10,18Z"
          />
        </svg>
      </button>
    </form>

    <p class="support-text">Use the Advanced Search to explore Pokémon by type or weakness!</p>
  </div>

  <aside class="info-panel">
    Search for a Pokémon by name or using its National Pokédex number.
  </aside>
</section>
